name: Scrape HNS data + deploy to GitHub Pages

# Pokreće se:
#  - svakih 30 minuta (cron)
#  - na svaki push u main (npr. promjena dizajna ili sadržaja)
#  - ručno preko Actions UI-a (workflow_dispatch)
on:
  schedule:
    - cron: "*/30 * * * *"   # svakih 30 min
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages permissions
permissions:
  contents: write
  pages: write
  id-token: write

# Spriječi paralelne deploy-eve, ali nemoj cancel-ati pending-e (bitno za scheduler)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    outputs:
      data_changed: ${{ steps.commit.outputs.data_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Scrape HNS Semafor + Facebook
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: npm run scrape

      - name: Commit if data changed
        id: commit
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Brza provjera ima li uopće što za commitati
          CHANGED=$(git status --porcelain src/data/ public/images/facebook/ public/images/facebook-albums/ 2>/dev/null)
          if [[ -z "$CHANGED" ]]; then
            echo "data_changed=false" >> "$GITHUB_OUTPUT"
            echo "✓ Data unchanged, skipping commit"
            exit 0
          fi

          # Sačuvaj scrapane fajlove izvan git radnog stabla
          TMPDIR=$(mktemp -d)
          cp -r src/data "$TMPDIR/data"
          if [[ -d public/images/facebook ]]; then
            cp -r public/images/facebook "$TMPDIR/fb"
          fi
          if [[ -d public/images/facebook-albums ]]; then
            cp -r public/images/facebook-albums "$TMPDIR/fb-albums"
          fi

          # Strategija: scrape je idempotentan (zadnji rezultat uvijek pobjeđuje).
          # Umjesto rebase-a koji može imati JSON konflikte, resetiramo na latest
          # origin/main i ponovo apply-amo svježe scrapane fajlove.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main

            # Vrati svježe scrapane fajlove na vrh
            rm -rf src/data
            cp -r "$TMPDIR/data" src/data
            if [[ -d "$TMPDIR/fb" ]]; then
              mkdir -p public/images
              rm -rf public/images/facebook
              cp -r "$TMPDIR/fb" public/images/facebook
            fi
            if [[ -d "$TMPDIR/fb-albums" ]]; then
              mkdir -p public/images
              rm -rf public/images/facebook-albums
              cp -r "$TMPDIR/fb-albums" public/images/facebook-albums
            fi

            # Ako je remote već stigao do istog stanja, nemamo što pushati
            if [[ -z "$(git status --porcelain src/data/ public/images/facebook/ public/images/facebook-albums/ 2>/dev/null)" ]]; then
              echo "✓ Remote već ima iste podatke, ništa za pushati"
              echo "data_changed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            git add src/data/ public/images/facebook/ public/images/facebook-albums/
            git commit -m "chore(data): update scrape $(date -u +%Y-%m-%dT%H:%MZ)"

            if git push; then
              echo "✓ Push uspio (pokušaj $attempt)"
              echo "data_changed=true" >> "$GITHUB_OUTPUT"
              echo "✓ Data updated and committed"
              exit 0
            fi

            echo "Push pokušaj $attempt neuspješan (vjerojatno paralelni run), pokušavam ponovo..."
            sleep $((attempt * 5))
          done

          echo "✗ Push neuspješan nakon 5 pokušaja"
          exit 1

  build-and-deploy:
    needs: scrape
    # Deploy uvijek na push (jer je možda promijenjen kod, ne samo data)
    # Na cron: deploy samo ako su se podaci promijenili
    if: github.event_name != 'schedule' || needs.scrape.outputs.data_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # uzmi najnoviji main (uključujući commit iz scrape job-a)

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        # prebuild script već scrapa, ali to je brzo i daje nam svjeze podatke
        run: npm run build
        env:
          # FB token treba i build step-u jer prebuild ponovo scrapa
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - id: deployment
        uses: actions/deploy-pages@v4
